name: Deploy WA
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret 값 주입
        run: |
          sed -i "s|\\$APPS_SCRIPT_URL|${{ secrets.APPS_SCRIPT_URL }}|g" index.template.html
          sed -i "s|\\$API_TOKEN|${{ secrets.API_TOKEN }}|g" index.template.html
          mv index.template.html index.html
      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
