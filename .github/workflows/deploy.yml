  name: Deploy to GitHub Pages

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  permissions:
    contents: read
    pages   : write
    id-token: write

  concurrency:
    group            : "pages"
    cancel-in-progress: false

  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
      environment:
        name: github-pages
        url : ${{ steps.deployment.outputs.page_url }}

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Inject Secrets into index.html
          env:
            API_URL  : ${{ secrets.APPS_SCRIPT_URL }}
            API_TOKEN: ${{ secrets.API_TOKEN }}
          run: |
            sed -e "s|__API_URL__|${API_URL}|g" \
                -e "s|__API_TOKEN__|${API_TOKEN}|g" \
                index.template.html > index.html

            echo "✅ index.html 생성 완료"

            if grep -q "__API_URL__\|__API_TOKEN__" index.html; then
              echo "❌ Secrets가 주입되지 않았습니다."
              exit 1
            fi

            echo "생성된 index.html 크기: $(wc -c < index.html) bytes"

        - name: Setup Pages
          uses: actions/configure-pages@v4

        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: '.'

        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
